# Reusable build + test workflow. Lives in NotCavnfox/.github.
# Each fork calls it via `uses: NotCavnfox/.github/.github/workflows/build-test.yml@main`.
name: build-test (reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: "GHCR image name, e.g. ghcr.io/notcavnfox/seerr"
        required: true
        type: string
      context:
        description: "Docker build context"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      smoke_port:
        description: "Container port the smoke test curls"
        required: true
        type: number
      smoke_path:
        description: "HTTP path expected to return <400"
        required: false
        default: "/"
        type: string
      compose_test:
        description: "Run test/compose.test.yml integration stand-up"
        required: false
        default: true
        type: boolean
      run_smoke:
        description: "Run the standalone smoke test (disable for services that need external deps to boot)"
        required: false
        default: true
        type: boolean
      publish_edge:
        description: "On push to default branch, publish :edge to GHCR"
        required: false
        default: false
        type: boolean
      build_args:
        description: "Newline-separated build args, e.g. COMMIT_TAG=<sha>. Seerr needs COMMIT_TAG or its UI loops on an update prompt."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          load: true
          tags: localbuild:ci
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        if: ${{ inputs.run_smoke }}
        env:
          IMAGE: localbuild:ci
          PORT: ${{ inputs.smoke_port }}
          HEALTH_PATH: ${{ inputs.smoke_path }}
        run: bash test/smoke.sh

      # Readiness is polled from the host against the published port, so this
      # does NOT depend on curl/wget existing inside the image.
      - name: Integration test (compose)
        if: ${{ inputs.compose_test }}
        env:
          PORT: ${{ inputs.smoke_port }}
          HEALTH_PATH: ${{ inputs.smoke_path }}
        run: |
          if [ ! -f test/compose.test.yml ]; then
            echo "No test/compose.test.yml — skipping integration test"; exit 0
          fi
          IMAGE=localbuild:ci docker compose -f test/compose.test.yml up -d
          ok=0
          for i in $(seq 1 80); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${PORT}${HEALTH_PATH}" || echo 000)
            if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
              echo "integration ok (HTTP $code after $((i*3))s)"; ok=1; break
            fi
            sleep 3
          done
          IMAGE=localbuild:ci docker compose -f test/compose.test.yml logs --tail 60 || true
          IMAGE=localbuild:ci docker compose -f test/compose.test.yml down -v || true
          [ "$ok" = 1 ] || { echo "integration: no healthy response within timeout (last: ${code})"; exit 1; }

      - name: Log in to GHCR
        if: ${{ inputs.publish_edge && github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish :edge
        if: ${{ inputs.publish_edge && github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ inputs.image_name }}:edge
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
